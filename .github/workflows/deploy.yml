name: Deploy PF Searcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pf-searcher
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "${{ secrets.SERVER_PORT }}" || (echo "Missing secret: SERVER_PORT" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/pf_searcher_deploy_key
          chmod 600 ~/.ssh/pf_searcher_deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Create package
        run: |
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            -czf pf-searcher-release.tgz .

      - name: Push package to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh \
            -i ~/.ssh/pf_searcher_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            < pf-searcher-release.tgz
