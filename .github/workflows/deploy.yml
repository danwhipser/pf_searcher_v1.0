name: Deploy PF Searcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pf-searcher
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check required secrets
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "${{ secrets.SERVER_PORT }}" || (echo "Missing secret: SERVER_PORT" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            bash /usr/local/bin/update-pf-searcher
